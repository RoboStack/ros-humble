  # so we use the rev key to ensure that it is propagated to the v1 recipe generated
  rev: 50277e341f61455c42a6015b5718804a4f8588f6
  url: https://github.com/osrf/dynamic_message_introspection.git
  version: 0.1.0
  # This is an attribute that is not found in rosdistro_snapshot.yaml,
  # but it is used in rosdistro_additional_recipes.yaml to indicate if the
  # package to build is not in the root of the repository, but in a subfolder.
  additional_folder: dynmsg
