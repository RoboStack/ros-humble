package:
  name: ros-humble-ublox-gps
  version: 2.3.0
source:
  git_url: https://github.com/ros2-gbp/ublox-release.git
  git_rev: release/humble/ublox_gps/2.3.0-2
  folder: ros-humble-ublox-gps/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - asio
    - python
    - ros-humble-ament-cmake-ros
    - ros-humble-diagnostic-msgs
    - ros-humble-diagnostic-updater
    - ros-humble-geometry-msgs
    - ros-humble-rcl-interfaces
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-tf2
    - ros-humble-ublox-msgs
    - ros-humble-ublox-serialization
    - ros2-distro-mutex 0.1 humble
  run:
    - asio
    - python
    - ros-humble-diagnostic-msgs
    - ros-humble-diagnostic-updater
    - ros-humble-geometry-msgs
    - ros-humble-rcl-interfaces
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-tf2
    - ros-humble-ublox-msgs
    - ros-humble-ublox-serialization
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
