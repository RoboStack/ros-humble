package:
  name: ros-humble-composition
  version: 0.20.2
source:
  git_url: https://github.com/ros2-gbp/demos-release.git
  git_rev: release/humble/composition/0.20.2-1
  folder: ros-humble-composition/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-pytest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-example-interfaces
    - ros-humble-launch
    - ros-humble-launch-testing
    - ros-humble-launch-testing-ament-cmake
    - ros-humble-launch-testing-ros
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-rcutils
    - ros-humble-rmw-implementation-cmake
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-example-interfaces
    - ros-humble-launch-ros
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-rcutils
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
