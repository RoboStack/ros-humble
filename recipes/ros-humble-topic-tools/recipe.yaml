package:
  name: ros-humble-topic-tools
  version: 1.0.0
source:
  git_url: https://github.com/ros2-gbp/topic_tools-release.git
  git_rev: release/humble/topic_tools/1.0.0-2
  folder: ros-humble-topic-tools/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): numpy
  host:
    - numpy
    - python
    - ros-humble-ament-cmake-auto
    - ros-humble-ament-cmake-python
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-rosidl-default-generators
    - ros-humble-topic-tools-interfaces
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-rclpy
    - ros-humble-ros-workspace
    - ros-humble-ros2cli
    - ros-humble-rosidl-runtime-py
    - ros-humble-topic-tools-interfaces
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
