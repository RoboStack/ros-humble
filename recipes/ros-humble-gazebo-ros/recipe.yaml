package:
  name: ros-humble-gazebo-ros
  version: 3.7.0
source:
  git_url: https://github.com/ros2-gbp/gazebo_ros_pkgs-release.git
  git_rev: release/humble/gazebo_ros/3.7.0-1
  folder: ros-humble-gazebo-ros/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): pkg-config
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-builtin-interfaces
    - ros-humble-gazebo-dev
    - ros-humble-gazebo-msgs
    - ros-humble-geometry-msgs
    - ros-humble-launch-testing-ament-cmake
    - ros-humble-rcl
    - ros-humble-rclcpp
    - ros-humble-rclpy
    - ros-humble-rmw
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-ros2run
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-tinyxml-vendor
    - ros2-distro-mutex 0.1 humble
    - sel(build_platform == target_platform): pkg-config
  run:
    - lxml
    - python
    - ros-humble-builtin-interfaces
    - ros-humble-gazebo-dev
    - ros-humble-gazebo-msgs
    - ros-humble-geometry-msgs
    - ros-humble-launch-ros
    - ros-humble-rcl
    - ros-humble-rclcpp
    - ros-humble-rclpy
    - ros-humble-rmw
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-srvs
    - ros-humble-tinyxml-vendor
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
