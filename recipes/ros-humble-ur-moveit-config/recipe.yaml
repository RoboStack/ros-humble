package:
  name: ros-humble-ur-moveit-config
  version: 2.2.1
source:
  git_url: https://github.com/ros2-gbp/Universal_Robots_ROS2_Driver-release.git
  git_rev: release/humble/ur_moveit_config/2.2.1-1
  folder: ros-humble-ur-moveit-config/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-python
    - ros-humble-rclpy
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-launch
    - ros-humble-launch-ros
    - ros-humble-moveit-kinematics
    - ros-humble-moveit-planners-ompl
    - ros-humble-moveit-ros-move-group
    - ros-humble-moveit-ros-visualization
    - ros-humble-moveit-servo
    - ros-humble-moveit-simple-controller-manager
    - ros-humble-rclpy
    - ros-humble-ros-workspace
    - ros-humble-rviz2
    - ros-humble-ur-description
    - ros-humble-urdf
    - ros-humble-warehouse-ros-sqlite
    - ros-humble-xacro
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
