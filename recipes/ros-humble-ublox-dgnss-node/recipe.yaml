package:
  name: ros-humble-ublox-dgnss-node
  version: 0.3.5
source:
  git_url: https://github.com/aussierobots/ublox_dgnss-release.git
  git_rev: release/humble/ublox_dgnss_node/0.3.5-4
  folder: ros-humble-ublox-dgnss-node/src/work
  patches:
    - patch/ros-humble-ublox-dgnss-node.patch

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): pkg-config
    - sel(linux): "{{ cdt('libudev') }}"
    - sel(linux): "{{ cdt('libudev-devel') }}"
  host:
    - libusb
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-copyright
    - ros-humble-ament-cmake-cppcheck
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-ublox-ubx-interfaces
    - ros-humble-ublox-ubx-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(build_platform == target_platform): pkg-config
  run:
    - libusb
    - python
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros-humble-ublox-ubx-interfaces
    - ros-humble-ublox-ubx-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
