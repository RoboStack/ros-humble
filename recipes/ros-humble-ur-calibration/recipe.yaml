package:
  name: ros-humble-ur-calibration
  version: 2.2.1
source:
  git_url: https://github.com/ros2-gbp/Universal_Robots_ROS2_Driver-release.git
  git_rev: release/humble/ur_calibration/2.2.1-1
  folder: ros-humble-ur-calibration/src/work
  patches:
    - patch/ros-humble-ur-calibration.patch

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - eigen
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gmock
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-rclcpp
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-ur-client-library
    - ros-humble-ur-robot-driver
    - ros2-distro-mutex 0.1 humble
    - yaml-cpp
  run:
    - eigen
    - python
    - ros-humble-rclcpp
    - ros-humble-ros-workspace
    - ros-humble-ur-client-library
    - ros-humble-ur-robot-driver
    - ros2-distro-mutex 0.1 humble
    - yaml-cpp
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
