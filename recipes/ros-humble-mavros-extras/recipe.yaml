# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json

package:
  name: ros-humble-mavros-extras
  version: 2.10.1
source:
  git: https://github.com/ros2-gbp/mavros-release.git
  tag: release/humble/mavros_extras/2.10.1-1
  target_directory: ros-humble-mavros-extras/src/work
  patches:
    - patch/ros-humble-mavros-extras.patch

build:
  script: ${{ '$RECIPE_DIR/build_ament_cmake.sh' if unix or wasm32 else '%RECIPE_DIR%\\bld_ament_cmake.bat' }}
  number: 14
  post_process:
    - files:
        - '*.pc'
      regex: (?:-L|-I)?"?([^;\s]+/sysroot/)
      replacement: $$(CONDA_BUILD_SYSROOT_S)
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/sysroot)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
    - files:
        - '*.cmake'
      regex: ([^;\s"]+/MacOSX\d*\.?\d*\.sdk)
      replacement: $$ENV{CONDA_BUILD_SYSROOT}
about:
  homepage: http://wiki.ros.org/mavros_extras
  repository: https://github.com/mavlink/mavros.git
  license: GPL-3.0-only OR LGPL-3.0-only OR BSD-3-Clause
  summary: Extra nodes and plugins for<a href="http://wiki.ros.org/mavros">MAVROS</a>.
extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ compiler('c') }}
    - if: target_platform!='emscripten-wasm32'
      then:
        - ${{ stdlib('c') }}
    - ninja
    - python
    - setuptools
    - git
    - git-lfs
    - if: unix
      then:
        - patch
        - make
        - coreutils
    - if: win
      then:
        - m2-patch
    - if: osx
      then:
        - tapi
    - if: build_platform != target_platform
      then:
        - pkg-config
    - cmake
    - cython
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - if: build_platform == target_platform
      then:
        - pkg-config
    - eigen
    - geographiclib-cpp
    - gmock
    - gtest
    - numpy
    - pip
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gmock
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-cmake-python
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-angles
    - ros-humble-diagnostic-msgs
    - ros-humble-diagnostic-updater
    - ros-humble-eigen-stl-containers
    - ros-humble-eigen3-cmake-module
    - ros-humble-geographic-msgs
    - ros-humble-geometry-msgs
    - ros-humble-libmavconn
    - ros-humble-mavlink
    - ros-humble-mavros
    - ros-humble-mavros-msgs
    - ros-humble-message-filters
    - ros-humble-nav-msgs
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-rcpputils
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-tf2-eigen
    - ros-humble-tf2-ros
    - ros-humble-trajectory-msgs
    - ros-humble-urdf
    - ros-humble-visualization-msgs
    - ros-humble-yaml-cpp-vendor
    - ros2-distro-mutex 0.7.* humble_*
    - yaml-cpp
  run:
    - eigen
    - geographiclib-cpp
    - python
    - ros-humble-diagnostic-msgs
    - ros-humble-diagnostic-updater
    - ros-humble-eigen-stl-containers
    - ros-humble-eigen3-cmake-module
    - ros-humble-geographic-msgs
    - ros-humble-geometry-msgs
    - ros-humble-libmavconn
    - ros-humble-mavlink
    - ros-humble-mavros
    - ros-humble-mavros-msgs
    - ros-humble-message-filters
    - ros-humble-nav-msgs
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-rcpputils
    - ros-humble-ros-workspace
    - ros-humble-rosidl-default-runtime
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-tf2-eigen
    - ros-humble-tf2-ros
    - ros-humble-trajectory-msgs
    - ros-humble-urdf
    - ros-humble-visualization-msgs
    - ros-humble-yaml-cpp-vendor
    - ros2-distro-mutex 0.7.* humble_*
    - yaml-cpp
    - if: osx and x86_64
      then:
        - __osx >=${{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
