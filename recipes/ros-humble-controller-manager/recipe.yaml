package:
  name: ros-humble-controller-manager
  version: 2.12.0
source:
  git_url: https://github.com/ros2-gbp/ros2_control-release.git
  git_rev: release/humble/controller_manager/2.12.0-1
  folder: ros-humble-controller-manager/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gmock
    - ros-humble-ament-cmake-python
    - ros-humble-ament-index-cpp
    - ros-humble-controller-interface
    - ros-humble-controller-manager-msgs
    - ros-humble-hardware-interface
    - ros-humble-launch
    - ros-humble-launch-ros
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-rcpputils
    - ros-humble-realtime-tools
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-ros2-control-test-assets
    - ros-humble-ros2param
    - ros-humble-ros2run
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-ament-index-cpp
    - ros-humble-controller-interface
    - ros-humble-controller-manager-msgs
    - ros-humble-hardware-interface
    - ros-humble-launch
    - ros-humble-launch-ros
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-rcpputils
    - ros-humble-ros-workspace
    - ros-humble-ros2-control-test-assets
    - ros-humble-ros2param
    - ros-humble-ros2run
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
