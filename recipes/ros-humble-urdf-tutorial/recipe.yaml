package:
  name: ros-humble-urdf-tutorial
  version: 1.0.0
source:
  git_url: https://github.com/ros2-gbp/urdf_tutorial-release.git
  git_rev: release/humble/urdf_tutorial/1.0.0-3
  folder: ros-humble-urdf-tutorial/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-lint-auto
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-joint-state-publisher
    - ros-humble-joint-state-publisher-gui
    - ros-humble-robot-state-publisher
    - ros-humble-ros-workspace
    - ros-humble-rviz2
    - ros-humble-xacro
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
