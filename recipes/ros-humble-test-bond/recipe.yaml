package:
  name: ros-humble-test-bond
  version: 3.0.2
source:
  git_url: https://github.com/ros2-gbp/bond_core-release.git
  git_rev: release/humble/test_bond/3.0.2-2
  folder: ros-humble-test-bond/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): numpy
    - sel(build_platform != target_platform): pkg-config
  host:
    - libuuid
    - numpy
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-bond
    - ros-humble-bondcpp
    - ros-humble-builtin-interfaces
    - ros-humble-rclcpp
    - ros-humble-rclcpp-lifecycle
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-rosidl-default-generators
    - ros-humble-std-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(build_platform == target_platform): pkg-config
  run:
    - python
    - ros-humble-builtin-interfaces
    - ros-humble-ros-workspace
    - ros-humble-rosidl-default-runtime
    - ros-humble-std-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
