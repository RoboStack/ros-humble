package:
  name: ros-humble-moveit-ros-planning
  version: 2.5.1
source:
  git_url: https://github.com/moveit/moveit2-release.git
  git_rev: release/humble/moveit_ros_planning/2.5.1-1
  folder: ros-humble-moveit-ros-planning/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): pkg-config
  host:
    - eigen
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gmock
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-index-cpp
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-eigen3-cmake-module
    - ros-humble-message-filters
    - ros-humble-moveit-common
    - ros-humble-moveit-core
    - ros-humble-moveit-msgs
    - ros-humble-moveit-resources-panda-moveit-config
    - ros-humble-moveit-ros-occupancy-map-monitor
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-rclcpp-action
    - ros-humble-ros-environment
    - ros-humble-ros-testing
    - ros-humble-ros-workspace
    - ros-humble-srdfdom
    - ros-humble-tf2
    - ros-humble-tf2-eigen
    - ros-humble-tf2-geometry-msgs
    - ros-humble-tf2-msgs
    - ros-humble-tf2-ros
    - ros-humble-urdf
    - ros2-distro-mutex 0.1 humble
    - sel(build_platform == target_platform): pkg-config
  run:
    - eigen
    - python
    - ros-humble-ament-index-cpp
    - ros-humble-eigen3-cmake-module
    - ros-humble-message-filters
    - ros-humble-moveit-common
    - ros-humble-moveit-core
    - ros-humble-moveit-msgs
    - ros-humble-moveit-ros-occupancy-map-monitor
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-rclcpp-action
    - ros-humble-ros-workspace
    - ros-humble-srdfdom
    - ros-humble-tf2
    - ros-humble-tf2-eigen
    - ros-humble-tf2-geometry-msgs
    - ros-humble-tf2-msgs
    - ros-humble-tf2-ros
    - ros-humble-urdf
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
