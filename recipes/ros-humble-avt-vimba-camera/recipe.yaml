package:
  name: ros-humble-avt-vimba-camera
  version: 2001.1.0
source:
  git_url: https://github.com/ros2-gbp/avt_vimba_camera-release.git
  git_rev: release/humble/avt_vimba_camera/2001.1.0-3
  folder: ros-humble-avt-vimba-camera/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake-auto
    - ros-humble-camera-info-manager
    - ros-humble-diagnostic-msgs
    - ros-humble-diagnostic-updater
    - ros-humble-image-transport
    - ros-humble-message-filters
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-camera-info-manager
    - ros-humble-diagnostic-msgs
    - ros-humble-diagnostic-updater
    - ros-humble-image-proc
    - ros-humble-image-transport
    - ros-humble-message-filters
    - ros-humble-rclcpp
    - ros-humble-rclcpp-components
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-stereo-image-proc
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
