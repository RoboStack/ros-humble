package:
  name: ros-humble-pilz-industrial-motion-planner
  version: 2.5.5
source:
  git_url: https://github.com/ros2-gbp/moveit2-release.git
  git_rev: release/humble/pilz_industrial_motion_planner/2.5.5-1
  folder: ros-humble-pilz-industrial-motion-planner/src/work
  patches:
    - patch/ros-humble-pilz-industrial-motion-planner.patch

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 4
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - sel(linux64): sysroot_linux-64 2.17
    - ninja
    - setuptools
    - sel(unix): make
    - sel(unix): coreutils
    - sel(osx): tapi
    - sel(build_platform != target_platform): pkg-config
    - cmake
    - cython
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): numpy
  host:
    - libboost-devel
    - libboost-python-devel
    - numpy
    - pip
    - sel(build_platform == target_platform): pkg-config
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gmock
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-eigen3-cmake-module
    - ros-humble-geometry-msgs
    - ros-humble-launch-param-builder
    - ros-humble-moveit-common
    - ros-humble-moveit-configs-utils
    - ros-humble-moveit-core
    - ros-humble-moveit-msgs
    - ros-humble-moveit-resources-panda-moveit-config
    - ros-humble-moveit-resources-prbt-moveit-config
    - ros-humble-moveit-resources-prbt-pg70-support
    - ros-humble-moveit-resources-prbt-support
    - ros-humble-moveit-ros-move-group
    - ros-humble-moveit-ros-planning
    - ros-humble-moveit-ros-planning-interface
    - ros-humble-orocos-kdl-vendor
    - ros-humble-pilz-industrial-motion-planner-testutils
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-ros-environment
    - ros-humble-ros-testing
    - ros-humble-ros-workspace
    - ros-humble-tf2
    - ros-humble-tf2-eigen
    - ros-humble-tf2-eigen-kdl
    - ros-humble-tf2-geometry-msgs
    - ros-humble-tf2-kdl
    - ros-humble-tf2-ros
    - ros2-distro-mutex 0.5 humble
  run:
    - python
    - ros-humble-eigen3-cmake-module
    - ros-humble-geometry-msgs
    - ros-humble-moveit-common
    - ros-humble-moveit-core
    - ros-humble-moveit-msgs
    - ros-humble-moveit-ros-move-group
    - ros-humble-moveit-ros-planning
    - ros-humble-moveit-ros-planning-interface
    - ros-humble-orocos-kdl-vendor
    - ros-humble-pluginlib
    - ros-humble-rclcpp
    - ros-humble-ros-workspace
    - ros-humble-tf2
    - ros-humble-tf2-eigen
    - ros-humble-tf2-eigen-kdl
    - ros-humble-tf2-geometry-msgs
    - ros-humble-tf2-kdl
    - ros-humble-tf2-ros
    - ros2-distro-mutex 0.5 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
