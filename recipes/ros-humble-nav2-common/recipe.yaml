package:
  name: ros-humble-nav2-common
  version: 1.1.0
source:
  git_url: https://github.com/SteveMacenski/navigation2-release.git
  git_rev: release/humble/nav2_common/1.1.0-2
  folder: ros-humble-nav2-common/src/work
  patches:
    - patch/ros-humble-nav2-common.win.patch

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - pyyaml
    - ros-humble-ament-cmake-core
    - ros-humble-ament-cmake-python
    - ros-humble-launch
    - ros-humble-launch-ros
    - ros-humble-osrf-pycommon
    - ros-humble-rclpy
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - pyyaml
    - ros-humble-ament-cmake-core
    - ros-humble-launch
    - ros-humble-launch-ros
    - ros-humble-osrf-pycommon
    - ros-humble-rclpy
    - ros-humble-ros-workspace
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
