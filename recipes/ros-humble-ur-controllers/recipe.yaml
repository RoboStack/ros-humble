package:
  name: ros-humble-ur-controllers
  version: 2.2.1
source:
  git_url: https://github.com/ros2-gbp/Universal_Robots_ROS2_Driver-release.git
  git_rev: release/humble/ur_controllers/2.2.1-1
  folder: ros-humble-ur-controllers/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-angles
    - ros-humble-controller-interface
    - ros-humble-joint-trajectory-controller
    - ros-humble-lifecycle-msgs
    - ros-humble-pluginlib
    - ros-humble-rclcpp-lifecycle
    - ros-humble-rcutils
    - ros-humble-realtime-tools
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-ur-dashboard-msgs
    - ros-humble-ur-msgs
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-angles
    - ros-humble-controller-interface
    - ros-humble-joint-trajectory-controller
    - ros-humble-lifecycle-msgs
    - ros-humble-pluginlib
    - ros-humble-rclcpp-lifecycle
    - ros-humble-rcutils
    - ros-humble-realtime-tools
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-ur-dashboard-msgs
    - ros-humble-ur-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
