package:
  name: ros-humble-webots-ros2
  version: 1.2.3
source:
  git_url: https://github.com/ros2-gbp/webots_ros2-release.git
  git_rev: release/humble/webots_ros2/1.2.3-1
  folder: ros-humble-webots-ros2/src/work

build:
  script:
    sel(win): bld_ament_python.bat
    sel(unix): build_ament_python.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - pytest
    - python
    - ros-humble-ament-copyright
    - ros-humble-ament-flake8
    - ros-humble-ament-pep257
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-webots-ros2-tests
    - ros2-distro-mutex 0.1 humble
    - setuptools
  run:
    - python
    - ros-humble-builtin-interfaces
    - ros-humble-rclpy
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros-humble-webots-ros2-control
    - ros-humble-webots-ros2-core
    - ros-humble-webots-ros2-driver
    - ros-humble-webots-ros2-epuck
    - ros-humble-webots-ros2-importer
    - ros-humble-webots-ros2-mavic
    - ros-humble-webots-ros2-msgs
    - ros-humble-webots-ros2-tesla
    - ros-humble-webots-ros2-tiago
    - ros-humble-webots-ros2-turtlebot
    - ros-humble-webots-ros2-universal-robot
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
