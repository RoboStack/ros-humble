package:
  name: ros-humble-io-context
  version: 1.2.0
source:
  git_url: https://github.com/ros2-gbp/transport_drivers-release.git
  git_rev: release/humble/io_context/1.2.0-2
  folder: ros-humble-io-context/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - asio
    - python
    - ros-humble-ament-cmake-auto
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-asio-cmake-module
    - ros-humble-rclcpp
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros-humble-udp-msgs
    - ros2-distro-mutex 0.1 humble
  run:
    - asio
    - python
    - ros-humble-rclcpp
    - ros-humble-ros-workspace
    - ros-humble-std-msgs
    - ros-humble-udp-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
