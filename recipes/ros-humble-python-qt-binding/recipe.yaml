package:
  name: ros-humble-python-qt-binding
  version: 1.1.1
source:
  git_url: https://github.com/ros2-gbp/python_qt_binding-release.git
  git_rev: release/humble/python_qt_binding/1.1.1-3
  folder: ros-humble-python-qt-binding/src/work
  patches:
    - patch/ros-humble-python-qt-binding.patch

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
    - sel(build_platform != target_platform): pyqt-builder
  host:
    - pyqt
    - python
    - qt-main
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-pytest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-ros-environment
    - ros-humble-ros-workspace
    - ros2-distro-mutex 0.1 humble
    - sel(build_platform == target_platform): pyqt-builder
  run:
    - pyqt
    - pyqt-builder
    - python
    - ros-humble-ros-workspace
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
