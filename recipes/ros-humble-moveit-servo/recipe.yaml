package:
  name: ros-humble-moveit-servo
  version: 2.5.1
source:
  git_url: https://github.com/moveit/moveit2-release.git
  git_rev: release/humble/moveit_servo/2.5.1-1
  folder: ros-humble-moveit-servo/src/work

build:
  script:
    sel(win): bld_ament_cmake.bat
    sel(unix): build_ament_cmake.sh
  number: 1
about:
  home: https://www.ros.org/
  license: BSD-3-Clause
  summary: |
    Robot Operating System

extra:
  recipe-maintainers:
    - ros-forge

requirements:
  build:
    - "{{ compiler('cxx') }}"
    - "{{ compiler('c') }}"
    - ninja
    - sel(unix): make
    - sel(osx): tapi
    - cmake
    - sel(build_platform != target_platform): python
    - sel(build_platform != target_platform): cross-python_{{ target_platform }}
    - sel(build_platform != target_platform): cython
  host:
    - python
    - ros-humble-ament-cmake
    - ros-humble-ament-cmake-gtest
    - ros-humble-ament-lint-auto
    - ros-humble-ament-lint-common
    - ros-humble-control-msgs
    - ros-humble-control-toolbox
    - ros-humble-controller-manager
    - ros-humble-geometry-msgs
    - ros-humble-moveit-common
    - ros-humble-moveit-core
    - ros-humble-moveit-msgs
    - ros-humble-moveit-resources-panda-moveit-config
    - ros-humble-moveit-ros-planning-interface
    - ros-humble-pluginlib
    - ros-humble-ros-environment
    - ros-humble-ros-testing
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-tf2-eigen
    - ros-humble-trajectory-msgs
    - ros2-distro-mutex 0.1 humble
  run:
    - python
    - ros-humble-control-msgs
    - ros-humble-control-toolbox
    - ros-humble-geometry-msgs
    - ros-humble-joint-state-broadcaster
    - ros-humble-joint-trajectory-controller
    - ros-humble-joy
    - ros-humble-launch-param-builder
    - ros-humble-moveit-common
    - ros-humble-moveit-configs-utils
    - ros-humble-moveit-core
    - ros-humble-moveit-msgs
    - ros-humble-moveit-ros-planning-interface
    - ros-humble-pluginlib
    - ros-humble-robot-state-publisher
    - ros-humble-ros-workspace
    - ros-humble-sensor-msgs
    - ros-humble-std-msgs
    - ros-humble-std-srvs
    - ros-humble-tf2-eigen
    - ros-humble-tf2-ros
    - ros-humble-trajectory-msgs
    - ros2-distro-mutex 0.1 humble
    - sel(osx and x86_64): __osx >={{ MACOSX_DEPLOYMENT_TARGET|default('10.14') }}
